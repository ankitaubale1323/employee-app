apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: {{ .Values.namespace }}
  labels:
    app: flask-app
spec:
  selector:
    app: flask-app
  ports:
    - name: http
      port: {{ .Values.flask.service.port }}
      targetPort: {{ .Values.flask.service.port }}
  type: ClusterIP
