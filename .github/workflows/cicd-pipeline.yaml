name: CICD

on:
  workflow_dispatch:

jobs:

  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4


  build-image:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/emp-app:latest -f app/docker/Dockerfile .

  scan-image:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/emp-app:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'


  push-image:
    runs-on: ubuntu-latest
    needs: scan-image
    steps:
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/emp-app:latest